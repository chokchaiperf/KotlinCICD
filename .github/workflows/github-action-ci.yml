name: Kotlin Multiplatform CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  android_build_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'shared/build.gradle.kts', 'KotlinCICD/build.gradle.kts') }}
          restore-keys: |
            gradle-android-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build shared (Android)
        run: ./gradlew :shared:assemble

      - name: Build Android app
        run: ./gradlew :KotlinCICD:assembleDebug

      - name: Run shared unit tests
        run: ./gradlew :shared:testDebugUnitTest

      - name: Run Android unit tests
        run: ./gradlew :KotlinCICD:testDebugUnitTest
      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Build ${{ github.workflow }}"
          description: "Github Action Branch: ${{ github.ref_name }}"

  ios_build_test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle and Konan
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-ios-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'shared/build.gradle.kts') }}
          restore-keys: |
            gradle-ios-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Run iOS simulator tests
        run: ./gradlew :shared:iosSimulatorArm64Test
      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Build ${{ github.workflow }}"
          description: "Github Action Branch: ${{ github.ref_name }}"