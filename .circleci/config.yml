version: 2.1

notify-success: &notify-success
  run:
    name: Notify Discord (Success)
    when: on_success
    command: |
      SHORT_SHA=$(echo $CIRCLE_SHA1 | cut -c1-7)
      COMMIT_MSG=$(git log -1 --pretty=format:"%s")

      # แยก Normal build vs Tag build
      if [ -n "$CIRCLE_TAG" ]; then
        TAG=$CIRCLE_TAG

        # Parse tag
        if [[ $TAG =~ ^([a-zA-Z]+)-v([0-9]+\.[0-9]+\.[0-9]+)-([0-9]{6})$ ]]; then
          RELEASE_SLOT="${BASH_REMATCH[1]}"
          VERSION="v${BASH_REMATCH[2]}"
          BUILD_DATE="${BASH_REMATCH[3]}"
        fi

        TITLE="🚀 Release: $VERSION ($RELEASE_SLOT)"
        TAG_FIELD="{ \"name\": \"Tag\", \"value\": \"\`$TAG\`\", \"inline\": true },"
        SLOT_FIELD="{ \"name\": \"Release Slot\", \"value\": \"\`$RELEASE_SLOT\`\", \"inline\": true },"
        COLOR=5793266  # น้ำเงิน = release
      else
        TITLE="✅ Success: $CIRCLE_JOB"
        TAG_FIELD=""
        SLOT_FIELD=""
        COLOR=3066993
      fi

      curl -s -o /dev/null -H "Content-Type: application/json" -d "{
        \"embeds\": [{
          \"title\": \"$TITLE\",
          \"color\": $COLOR,
          \"fields\": [
            { \"name\": \"Branch\", \"value\": \"\`${CIRCLE_BRANCH:-$CIRCLE_TAG}\`\", \"inline\": false },
            $TAG_FIELD
            $SLOT_FIELD
            { \"name\": \"Commit\", \"value\": \"\`$SHORT_SHA\` $COMMIT_MSG\", \"inline\": false },
            { \"name\": \"Triggered by\", \"value\": \"$CIRCLE_USERNAME\", \"inline\": true },
            { \"name\": \"Build\", \"value\": \"[#$CIRCLE_BUILD_NUM]($CIRCLE_BUILD_URL)\", \"inline\": true }
          ],
          \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
        }]
      }" "$DISCORD_WEBHOOK_URL"

notify-failure: &notify-failure
  run:
    name: Notify Discord (Failure)
    when: on_fail
    command: |
      SHORT_SHA=$(echo $CIRCLE_SHA1 | cut -c1-7)
      COMMIT_MSG=$(git log -1 --pretty=format:"%s")

      # แยก Normal build vs Tag build
      if [ -n "$CIRCLE_TAG" ]; then
        TAG=$CIRCLE_TAG

        # Parse tag
        if [[ $TAG =~ ^([a-zA-Z]+)-v([0-9]+\.[0-9]+\.[0-9]+)-([0-9]{6})$ ]]; then
          RELEASE_SLOT="${BASH_REMATCH[1]}"
          VERSION="v${BASH_REMATCH[2]}"
          BUILD_DATE="${BASH_REMATCH[3]}"
        fi

        TITLE="🚀 Release: $VERSION ($RELEASE_SLOT)"
        TAG_FIELD="{ \"name\": \"Tag\", \"value\": \"\`$TAG\`\", \"inline\": true },"
        SLOT_FIELD="{ \"name\": \"Release Slot\", \"value\": \"\`$RELEASE_SLOT\`\", \"inline\": true },"
        COLOR=5793266  # น้ำเงิน = release
      else
        TITLE="❌ Failure: $CIRCLE_JOB"
        TAG_FIELD=""
        SLOT_FIELD=""
        COLOR=15158332
      fi

      curl -s -o /dev/null -H "Content-Type: application/json" -d "{
        \"embeds\": [{
          \"title\": \"$TITLE\",
          \"color\": $COLOR,
          \"fields\": [
            { \"name\": \"Branch\", \"value\": \"\`${CIRCLE_BRANCH:-$CIRCLE_TAG}\`\", \"inline\": false },
            $TAG_FIELD
            $SLOT_FIELD
            { \"name\": \"Commit\", \"value\": \"\`$SHORT_SHA\` $COMMIT_MSG\", \"inline\": false },
            { \"name\": \"Triggered by\", \"value\": \"$CIRCLE_USERNAME\", \"inline\": true },
            { \"name\": \"Build\", \"value\": \"[#$CIRCLE_BUILD_NUM]($CIRCLE_BUILD_URL)\", \"inline\": true }
          ],
          \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
        }]
      }" "$DISCORD_WEBHOOK_URL"

jobs:
  android_build_test:
    docker:
      - image: cimg/android:2024.01

    steps:
      - checkout

      - run:
          name: Grant execute permission
          command: chmod +x gradlew

      - restore_cache:
          keys:
            - gradle-android-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "shared/build.gradle.kts" }}-{{ checksum "KotlinCICD/build.gradle.kts" }}
            - gradle-android-{{ checksum "gradle/libs.versions.toml" }}

      - run:
          name: Build shared (Android)
          command: ./gradlew :shared:assemble

      - run:
          name: Build Android app
          command: ./gradlew :KotlinCICD:assembleDebug

      - run:
          name: Run shared unit tests
          command: ./gradlew :shared:testDebugUnitTest

      - run:
          name: Run Android unit tests
          command: ./gradlew :KotlinCICD:testDebugUnitTest

      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-android-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "shared/build.gradle.kts" }}-{{ checksum "KotlinCICD/build.gradle.kts" }}

      - store_test_results:
          path: shared/build/test-results

      - store_test_results:
          path: KotlinCICD/build/test-results
      - *notify-success
      - *notify-failure

  ios_build_test:
    macos:
      xcode: "15.4.0"

    steps:
      - checkout

      - run:
          name: Setup JDK 17
          command: |
            brew install --cask temurin@17
            echo 'export JAVA_HOME=$(/usr/libexec/java_home -v 17)' >> "$BASH_ENV"
            source "$BASH_ENV"

      - run:
          name: Grant execute permission
          command: chmod +x gradlew

      - restore_cache:
          keys:
            - gradle-ios-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "shared/build.gradle.kts" }}
            - gradle-ios-{{ checksum "gradle/libs.versions.toml" }}
            - konan-{{ checksum "gradle/libs.versions.toml" }}

      - run:
          name: Build iOS framework
          command: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - run:
          name: Run iOS simulator tests
          command: ./gradlew :shared:iosSimulatorArm64Test

      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
            - ~/.konan
          key: gradle-ios-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "shared/build.gradle.kts" }}

      - store_test_results:
          path: shared/build/test-results
      - *notify-success
      - *notify-failure

workflows:
  build_and_test:
    jobs:
      - android_build_test:
          filters:
              tags:
                only: /^[a-zA-Z]+-v\d+\.\d+\.\d+-\d{6}$/  # match format ของคุณ
              branches:
                only: /.*/
      - ios_build_test:
          filters:
              tags:
                only: /^[a-zA-Z]+-v\d+\.\d+\.\d+-\d{6}$/  # match format ของคุณ
              branches:
                only: /.*/