version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2023.10

    steps:
      - checkout

      - run:
          name: Give permission
          command: chmod +x ./src/gradlew

      - restore_cache:
          keys:
            - gradle-cache-{{ checksum "src/build.gradle.kts" }}

      - run:
          name: Build
          command: cd src && ./gradlew build

      - run:
          name: Test
          command: cd src && ./gradlew test

      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-cache-{{ checksum "src/build.gradle.kts" }}

workflows:
  version: 2
  build_and_test:
    jobs:
      - build