version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2023.10

    steps:
      - checkout

      - run:
          name: Give permission
          command: chmod +x ./gradlew

      - restore_cache:
          keys:
            - gradle-cache-{{ checksum "build.gradle" }}

      - run:
          name: Build
          command: ./gradlew build

      - run:
          name: Test
          command: ./gradlew test

      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-cache-{{ checksum "build.gradle" }}

workflows:
  version: 2
  build_and_test:
    jobs:
      - build